name: CI
on: [push, pull_request]
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      CLAUDE_PLUGIN_ROOT: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
      - name: Install jq
        run: |
          if [[ "$RUNNER_OS" == "Linux" ]]; then
            sudo apt-get install -y jq
          fi
      - name: Run tests
        run: |
          for t in tests/test-*.sh; do
            echo "=== $t ==="
            bash "$t"
          done
